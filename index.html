<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>TimeLoop</title>
    
    <style>
        /* Global Design Variables */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-muted: #666666;
            --border-color: #ffffff;
            --focus-glow: 0 0 12px rgba(255, 255, 255, 0.85);
            --transition-speed: 0.2s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            background-color: #0a0a0a; /* Dark presentation backdrop background */
            color: var(--text-color);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Enforced 9:16 Container Frame - Adjusted to fix horizontal clipping */
        .app-frame {
            background-color: var(--bg-color);
            width: 100%;
            height: 100%;
            /* Strict 9:16 safe bounds mapping */
            max-width: min(430px, calc(100dvh * 9 / 16)); 
            max-height: calc(100vw * 16 / 9);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: clamp(20px, 4vh, 36px) 24px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.85);
        }

        /* Border trim for landscape screen wrappers */
        @media (min-aspect-ratio: 9/16) {
            .app-frame {
                border: 1px solid #222;
                border-radius: 4px;
            }
        }

        /* Branding Group */
        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: clamp(2.2rem, 5.5vh, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1;
        }

        .header p {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Interactive Element Resets */
        input, button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 0px;
            outline: none;
            font-size: 1rem;
            transition: box-shadow var(--transition-speed), background-color var(--transition-speed);
        }

        input:focus {
            box-shadow: var(--focus-glow);
        }

        button {
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Core Form Content Layout */
        .form-content {
            display: flex;
            flex-direction: column;
            gap: clamp(16px, 3.5vh, 28px);
            width: 100%;
            margin: auto 0;
        }

        /* URL Block */
        .url-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .url-group input {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            min-width: 0; /* Prevents input element blowout */
        }

        .url-group button {
            padding: 0 16px;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .url-group button:hover, .url-group button:focus {
            background-color: #ffffff;
            color: #000000;
        }

        /* Timestamps Group - Redesigned to use safe fluid percentages */
        .time-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .time-section label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .time-inputs {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
        }

        .time-inputs span {
            font-size: 1.2rem;
            font-weight: 300;
            color: var(--text-muted);
            user-select: none;
            padding-bottom: 2px;
        }

        .time-box {
            flex: 1; /* Automatically auto-scales inside the 9:16 view bounds */
            min-width: 0; /* Allows shrinking safely without forcing screen overflow */
            height: clamp(40px, 5.5vh, 48px);
            font-size: 1.15rem;
            text-align: center;
        }

        /* Master CTA Button */
        #convertBtn {
            padding: clamp(12px, 2vh, 16px);
            font-size: 0.95rem;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
            width: 100%;
            margin-top: auto;
        }

        #convertBtn:hover, #convertBtn:focus {
            background-color: transparent;
            color: var(--text-color);
            box-shadow: var(--focus-glow);
        }

        /* Notification Engine */
        #toast {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        #toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="app-frame">
        <div class="header">
            <h1>TimeLoop</h1>
            <p>Designed by Pankaj Mehra</p>
        </div>

        <div class="form-content">
            <div class="url-group">
                <input type="text" id="urlInput" placeholder="Paste YouTube Link..." autocomplete="off">
                <button id="pasteBtn" aria-label="Paste URL">Paste</button>
            </div>

            <div class="time-section">
                <label>Start Time</label>
                <div class="time-inputs">
                    <input type="tel" class="time-box" data-idx="0" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="HH">
                    <span>:</span>
                    <input type="tel" class="time-box" data-idx="1" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="MM">
                    <span>:</span>
                    <input type="tel" class="time-box" data-idx="2" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="SS">
                </div>
            </div>

            <div class="time-section">
                <label>Stop Time</label>
                <div class="time-inputs">
                    <input type="tel" class="time-box" data-idx="3" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="HH">
                    <span>:</span>
                    <input type="tel" class="time-box" data-idx="4" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="MM">
                    <span>:</span>
                    <input type="tel" class="time-box" data-idx="5" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="SS">
                </div>
            </div>
        </div>

        <button id="convertBtn">Convert & Copy</button>

        <div id="toast">Link Copied!</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlInput = document.getElementById('urlInput');
            const pasteBtn = document.getElementById('pasteBtn');
            const convertBtn = document.getElementById('convertBtn');
            const timeBoxes = Array.from(document.querySelectorAll('.time-box'));
            const toast = document.getElementById('toast');

            // System Clipboard Handling
            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    urlInput.value = text;
                    urlInput.focus();
                } catch (err) {
                    alert('Clipboard reading blocked. Paste manually inside the box.');
                }
            });

            // Input Navigation Framework
            timeBoxes.forEach((box, index) => {
                box.addEventListener('input', () => {
                    box.value = box.value.replace(/[^0-9]/g, '');
                    if (box.value.length === 2 && index < timeBoxes.length - 1) {
                        timeBoxes[index + 1].focus();
                    }
                });

                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (index < timeBoxes.length - 1) {
                            timeBoxes[index + 1].focus();
                        } else {
                            box.blur();
                            convertBtn.click();
                        }
                    }
                });

                box.addEventListener('blur', () => {
                    if (box.value === '') {
                        box.value = '00';
                    } else if (box.value.length === 1) {
                        box.value = '0' + box.value;
                    }
                });
                
                box.addEventListener('focus', () => box.select());
            });

            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    timeBoxes[0].focus();
                }
            });

            // Master Application Reset Shortcut
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    urlInput.value = '';
                    timeBoxes.forEach(box => box.value = '');
                    urlInput.focus();
                }
            });

            // Conversion Calculations
            const parseTimeToSeconds = (hours, minutes, seconds) => {
                return (parseInt(hours || 0, 10) * 3600) + 
                       (parseInt(minutes || 0, 10) * 60) + 
                       parseInt(seconds || 0, 10);
            };

            const extractYouTubeId = (url) => {
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                const match = url.match(regex);
                return match ? match[1] : null;
            };

            const showToast = () => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            };

            convertBtn.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                if (!url) return alert('Please input a YouTube address.');

                if (url.includes('youtube.com/embed/')) {
                    await navigator.clipboard.writeText(url);
                    showToast();
                    return;
                }

                const videoId = extractYouTubeId(url);
                if (!videoId) return alert('Unrecognized YouTube format.');

                timeBoxes.forEach(box => { if(!box.value) box.value = '00'; });

                const startSec = parseTimeToSeconds(timeBoxes[0].value, timeBoxes[1].value, timeBoxes[2].value);
                const stopSec = parseTimeToSeconds(timeBoxes[3].value, timeBoxes[4].value, timeBoxes[5].value);

                if (stopSec <= startSec && stopSec !== 0) {
                    return alert('Stop stamp must succeed start stamp.');
                }

                const embedUrl = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&start=${startSec}&end=${stopSec}`;

                try {
                    await navigator.clipboard.writeText(embedUrl);
                    showToast();
                } catch (err) {
                    const fallback = document.createElement('input');
                    fallback.value = embedUrl;
                    document.body.appendChild(fallback);
                    fallback.select();
                    document.execCommand('copy');
                    document.body.removeChild(fallback);
                    showToast();
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA & Safari Compatibility Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TimeLoop">
    
    <title>TimeLoop</title>
    
    <style>
        /* CSS Variables & Base Reset */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.8);
            --border-color: #ffffff;
            --muted-text: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Branding */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 10px;
            color: var(--muted-text);
            margin-top: 4px;
        }

        /* Input Groups */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted-text);
        }

        /* URL Box & Paste Button */
        .url-wrapper {
            display: flex;
            position: relative;
        }

        input[type="text"], input[type="tel"] {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            outline: none;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        input:focus {
            box-shadow: 0 0 8px var(--glow-color);
            border-color: var(--text-color);
        }

        .paste-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: box-shadow 0.2s ease;
        }

        .paste-btn:hover {
            box-shadow: 0 0 8px var(--glow-color);
        }

        /* Time Inputs Grid */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            align-items: center;
        }

        .time-grid input {
            text-align: center;
            letter-spacing: 2px;
        }

        /* Convert Button */
        .convert-btn {
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease;
            outline: none;
        }

        .convert-btn:hover, .convert-btn:focus {
            box-shadow: 0 0 12px var(--glow-color);
            background-color: transparent;
            color: var(--text-color);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 0 10px var(--glow-color);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Branding -->
        <div class="header">
            <h1>TimeLoop</h1>
            <p>Designed by Pankaj Mehra</p>
        </div>

        <!-- URL Input -->
        <div class="input-group">
            <label for="yt-url">YouTube Link</label>
            <div class="url-wrapper">
                <input type="text" id="yt-url" placeholder="Paste YouTube link here..." autocomplete="off">
                <button class="paste-btn" id="paste-btn">Paste</button>
            </div>
        </div>

        <!-- Start Time -->
        <div class="input-group">
            <label>Start Time (HH : MM : SS)</label>
            <div class="time-grid">
                <input type="tel" class="time-input" id="start-h" inputmode="numeric" pattern="[0-9]*" placeholder="00" maxlength="2">
                <input type="tel" class="time-input" id="start-m" inputmode="numeric" pattern="[0-9]*" placeholder="00" maxlength="2">
                <input type="tel" class="time-input" id="start-s" inputmode="numeric" pattern="[0-9]*" placeholder="00" maxlength="2">
            </div>
        </div>

        <!-- Stop Time -->
        <div class="input-group">
            <label>Stop Time (HH : MM : SS)</label>
            <div class="time-grid">
                <input type="tel" class="time-input" id="stop-h" inputmode="numeric" pattern="[0-9]*" placeholder="00" maxlength="2">
                <input type="tel" class="time-input" id="stop-m" inputmode="numeric" pattern="[0-9]*" placeholder="00" maxlength="2">
                <input type="tel" class="time-input" id="stop-s" inputmode="numeric" pattern="[0-9]*" placeholder="00" maxlength="2">
            </div>
        </div>

        <!-- Action -->
        <button class="convert-btn" id="convert-btn">Convert & Copy</button>
    </div>

    <!-- Toast Confirmation -->
    <div class="toast" id="toast">Copied!</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const ytUrlInput = document.getElementById('yt-url');
            const pasteBtn = document.getElementById('paste-btn');
            const convertBtn = document.getElementById('convert-btn');
            const toast = document.getElementById('toast');
            
            // Gather all time inputs in logical order
            const timeInputs = [
                document.getElementById('start-h'),
                document.getElementById('start-m'),
                document.getElementById('start-s'),
                document.getElementById('stop-h'),
                document.getElementById('stop-m'),
                document.getElementById('stop-s')
            ];

            // 1. Paste functionality utilizing the Clipboard API
            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    ytUrlInput.value = text;
                    ytUrlInput.focus();
                } catch (err) {
                    showToast('Clipboard access denied');
                }
            });

            // 2. Time Inputs Processing & Focus Logic
            timeInputs.forEach((input, index) => {
                
                // Allow numeric values only and auto-advance on 2 digits
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, ''); // Strip non-numeric
                    if (this.value.length === 2 && index < timeInputs.length - 1) {
                        timeInputs[index + 1].focus();
                    }
                });

                // Handle Enter key for manual advance / submit
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (index < timeInputs.length - 1) {
                            timeInputs[index + 1].focus();
                        } else {
                            convertBtn.click();
                            this.blur();
                        }
                    }
                });

                // Auto-padding when leaving the input box
                input.addEventListener('blur', function() {
                    if (this.value.length === 1) {
                        this.value = '0' + this.value;
                    } else if (this.value.length === 0) {
                        this.value = '00';
                    }
                });
            });

            // Handle Enter key inside the URL input box
            ytUrlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    timeInputs[0].focus();
                }
            });

            // Global shortcut: Escape to clear all inputs
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    ytUrlInput.value = '';
                    timeInputs.forEach(input => input.value = '');
                    ytUrlInput.focus();
                }
            });

            // 3. Conversion and Logic
            convertBtn.addEventListener('click', async () => {
                const url = ytUrlInput.value.trim();
                
                if (!url) {
                    showToast('Please paste a link first');
                    return;
                }

                // Robust Regex to extract YouTube Video ID (handles watch, embed, youtu.be, etc.)
                const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                const match = url.match(ytRegex);

                if (!match) {
                    showToast('Invalid YouTube Link');
                    return;
                }

                const videoId = match[1];

                // Convert times to total seconds
                const startSecs = calculateSeconds(timeInputs[0].value, timeInputs[1].value, timeInputs[2].value);
                const stopSecs = calculateSeconds(timeInputs[3].value, timeInputs[4].value, timeInputs[5].value);

                // Build Final Link
                let finalEmbedLink = `https://www.youtube.com/embed/${videoId}?enablejsapi=1`;
                if (startSecs > 0) finalEmbedLink += `&start=${startSecs}`;
                if (stopSecs > 0) finalEmbedLink += `&end=${stopSecs}`;

                // Check if already correct embed format (Edge Case: unchanged if parameters match exactly)
                if (url === finalEmbedLink) {
                    showToast('Link is already optimized');
                    return;
                }

                // Copy to clipboard
                try {
                    await navigator.clipboard.writeText(finalEmbedLink);
                    showToast('Link Copied!');
                    ytUrlInput.value = finalEmbedLink; // Show the user the generated link
                } catch (err) {
                    // Fallback for older browsers
                    const tempInput = document.createElement('input');
                    tempInput.value = finalEmbedLink;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                    showToast('Link Copied!');
                    ytUrlInput.value = finalEmbedLink;
                }
            });

            // Helper: Convert HH:MM:SS to total seconds
            function calculateSeconds(h, m, s) {
                const hours = parseInt(h, 10) || 0;
                const minutes = parseInt(m, 10) || 0;
                const seconds = parseInt(s, 10) || 0;
                return (hours * 3600) + (minutes * 60) + seconds;
            }

            // Helper: Display clean Toast Notifications
            function showToast(message) {
                toast.textContent = message;
                toast.classList.add('show');
                
                // Clear existing timeout to prevent flickering if clicked multiple times
                if(window.toastTimeout) clearTimeout(window.toastTimeout);
                
                window.toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>TimeLoop</title>
    
    <style>
        /* CSS Variables & Reset */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.2);
            --focus-glow: 0 0 10px rgba(255, 255, 255, 0.6);
            --transition-speed: 0.2s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Branding (Fixed perfectly to the top) */
        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .header p {
            font-size: 0.8rem;
            color: #888888;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            background-color: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 30px;
        }

        /* Inputs & Buttons Common - Resetting iOS Safari defaults */
        input, button {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            outline: none;
            transition: all var(--transition-speed) ease;
        }

        input:focus {
            border-color: #ffffff;
            box-shadow: var(--focus-glow);
        }

        button {
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        button:hover, button:focus {
            border-color: #ffffff;
            box-shadow: var(--focus-glow);
            background-color: #111;
        }

        button:active {
            transform: scale(0.98);
        }

        /* URL Input Group */
        .url-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .url-group input {
            flex: 1;
            padding: 0 16px;
            font-size: 0.95rem;
            height: 48px;
        }

        .url-group button {
            padding: 0 24px;
            font-size: 0.85rem;
            white-space: nowrap;
            height: 48px;
        }

        /* Force crisp structural alignment via CSS Grid */
        .time-boxes-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
        }

        /* Timestamp Sections */
        .time-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #0c0c0c;
            border: 1px solid #161616;
            padding: 20px 15px;
            border-radius: 8px;
            width: 100%;
        }

        .time-section label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #aaaaaa;
            font-weight: 600;
            text-align: center;
        }

        .time-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        /* Total vertical alignment control for colons */
        .time-inputs span {
            font-weight: bold;
            font-size: 1.2rem;
            color: #555555;
            width: 10px;
            text-align: center;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .time-box {
            width: 62px;
            height: 44px;
            font-size: 1.1rem;
            text-align: center;
            padding: 0;
        }

        /* Action Button */
        #convertBtn {
            font-size: 0.95rem;
            background-color: #ffffff;
            color: #000000;
            height: 52px;
            border: none;
            width: 100%;
        }

        #convertBtn:hover, #convertBtn:focus {
            background-color: #dddddd;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            color: #000000;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            box-shadow: 0 4px 20px rgba(255,255,255,0.15);
        }

        #toast.show {
            opacity: 1;
        }

        /* Responsive Breakpoint for iPad and Desktop Screens */
        @media (min-width: 500px) {
            .time-boxes-wrapper {
                grid-template-columns: 1fr 1fr; /* Absolute mathematical 50/50 split alignment */
                gap: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TimeLoop</h1>
        <p>Designed by Pankaj Mehra</p>
    </div>

    <div class="container">
        <div class="url-group">
            <input type="text" id="urlInput" placeholder="Paste YouTube Link here..." autocomplete="off">
            <button id="pasteBtn" aria-label="Paste URL">Paste</button>
        </div>

        <div class="time-boxes-wrapper">
            <div class="time-section">
                <label>Start Time</label>
                <div class="time-inputs">
                    <input type="tel" class="time-box start-box" data-idx="0" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="HH">
                    <span>:</span>
                    <input type="tel" class="time-box start-box" data-idx="1" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="MM">
                    <span>:</span>
                    <input type="tel" class="time-box start-box" data-idx="2" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="SS">
                </div>
            </div>

            <div class="time-section">
                <label>Stop Time</label>
                <div class="time-inputs">
                    <input type="tel" class="time-box stop-box" data-idx="3" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="HH">
                    <span>:</span>
                    <input type="tel" class="time-box stop-box" data-idx="4" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="MM">
                    <span>:</span>
                    <input type="tel" class="time-box stop-box" data-idx="5" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="SS">
                </div>
            </div>
        </div>

        <button id="convertBtn">Convert & Copy</button>
    </div>

    <div id="toast">Link Copied to Clipboard!</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlInput = document.getElementById('urlInput');
            const pasteBtn = document.getElementById('pasteBtn');
            const convertBtn = document.getElementById('convertBtn');
            const timeBoxes = Array.from(document.querySelectorAll('.time-box'));
            const toast = document.getElementById('toast');

            // Clipboard Paste
            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    urlInput.value = text;
                    urlInput.focus();
                } catch (err) {
                    alert('Clipboard access denied. Please paste manually.');
                }
            });

            // Time Box Logic
            timeBoxes.forEach((box, index) => {
                box.addEventListener('input', (e) => {
                    box.value = box.value.replace(/[^0-9]/g, '');
                    if (box.value.length === 2 && index < timeBoxes.length - 1) {
                        timeBoxes[index + 1].focus();
                    }
                });

                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (index < timeBoxes.length - 1) {
                            timeBoxes[index + 1].focus();
                        } else {
                            box.blur();
                            convertBtn.click();
                        }
                    }
                });

                box.addEventListener('blur', () => {
                    if (box.value === '') {
                        box.value = '00';
                    } else if (box.value.length === 1) {
                        box.value = '0' + box.value;
                    }
                });
                
                box.addEventListener('focus', () => box.select());
            });

            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    timeBoxes[0].focus();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    urlInput.value = '';
                    timeBoxes.forEach(box => box.value = '');
                    urlInput.focus();
                }
            });

            // Core Conversion
            const parseTimeToSeconds = (hours, minutes, seconds) => {
                return (parseInt(hours || 0, 10) * 3600) + 
                       (parseInt(minutes || 0, 10) * 60) + 
                       parseInt(seconds || 0, 10);
            };

            const extractYouTubeId = (url) => {
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                const match = url.match(regex);
                return match ? match[1] : null;
            };

            const showToast = () => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            };

            convertBtn.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                if (!url) return alert('Please enter a YouTube URL.');

                if (url.includes('youtube.com/embed/') && url.includes('start=') && url.includes('end=')) {
                    await navigator.clipboard.writeText(url);
                    showToast();
                    return;
                }

                const videoId = extractYouTubeId(url);
                if (!videoId) return alert('Invalid YouTube URL.');

                timeBoxes.forEach(box => { if(!box.value) box.value = '00'; });

                const startSec = parseTimeToSeconds(timeBoxes[0].value, timeBoxes[1].value, timeBoxes[2].value);
                const stopSec = parseTimeToSeconds(timeBoxes[3].value, timeBoxes[4].value, timeBoxes[5].value);

                if (stopSec <= startSec && stopSec !== 0) {
                    return alert('Stop time must be greater than Start time.');
                }

                const embedUrl = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&start=${startSec}&end=${stopSec}`;

                try {
                    await navigator.clipboard.writeText(embedUrl);
                    showToast();
                } catch (err) {
                    const tempInput = document.createElement('input');
                    tempInput.value = embedUrl;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                    showToast();
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA & Safari Fullscreen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>TimeLoop</title>
    
    <style>
        /* CSS Variables & Global Reset */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-muted: #888888;
            --border-color: #ffffff;
            --focus-glow: 0 0 15px rgba(255, 255, 255, 0.9);
            --transition-speed: 0.25s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 24px;
        }

        /* Top Screen Branding */
        .header {
            text-align: center;
            margin-bottom: 60px;
            width: 100%;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 12px;
        }

        /* Layout Container */
        .container {
            width: 100%;
            max-width: 540px;
            display: flex;
            flex-direction: column;
            gap: 36px;
        }

        /* Interactive Elements Base Style */
        input, button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 0px; /* Sharp minimalist edges */
            outline: none;
            font-size: 1rem;
            transition: box-shadow var(--transition-speed), border-color var(--transition-speed), background-color var(--transition-speed);
        }

        input:focus {
            box-shadow: var(--focus-glow);
        }

        button {
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1.5px;
        }

        /* URL Section Alignment */
        .url-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .url-group input {
            flex: 1;
            padding: 16px;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .url-group button {
            padding: 0 24px;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .url-group button:hover, .url-group button:focus {
            background-color: #ffffff;
            color: #000000;
            box-shadow: var(--focus-glow);
        }

        /* Timestamp Sections Grid Architecture */
        .time-boxes-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            width: 100%;
        }

        .time-section {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .time-section label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .time-inputs {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-inputs span {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text-muted);
            user-select: none;
            line-height: 1;
        }

        .time-box {
            flex: 1;
            max-width: 75px;
            height: 54px;
            font-size: 1.25rem;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Convert Button Styling */
        #convertBtn {
            padding: 18px;
            font-size: 1rem;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
            margin-top: 10px;
        }

        #convertBtn:hover, #convertBtn:focus {
            background-color: transparent;
            color: var(--text-color);
            box-shadow: var(--focus-glow);
        }

        #convertBtn:active {
            transform: scale(0.99);
        }

        /* Toast Component */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 12px 28px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        #toast.show {
            opacity: 1;
        }

        /* Responsive Desktop Variations */
        @media (min-width: 600px) {
            body {
                padding-top: 60px;
            }
            
            .header h1 {
                font-size: 4.5rem;
            }

            .time-boxes-wrapper {
                grid-template-columns: 1fr 1fr;
                gap: 40px;
            }

            .time-box {
                max-width: none; /* Allows flexible stretch with clean grid gaps */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TimeLoop</h1>
        <p>Designed by Pankaj Mehra</p>
    </div>

    <div class="container">
        <!-- URL Entry Box -->
        <div class="url-group">
            <input type="text" id="urlInput" placeholder="Paste YouTube Link here..." autocomplete="off">
            <button id="pasteBtn" aria-label="Paste URL">Paste</button>
        </div>

        <!-- Segment Timestamps Setup -->
        <div class="time-boxes-wrapper">
            <!-- Start Point Configuration -->
            <div class="time-section">
                <label>Start Time</label>
                <div class="time-inputs">
                    <input type="tel" class="time-box start-box" data-idx="0" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="HH">
                    <span>:</span>
                    <input type="tel" class="time-box start-box" data-idx="1" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="MM">
                    <span>:</span>
                    <input type="tel" class="time-box start-box" data-idx="2" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="SS">
                </div>
            </div>

            <!-- Stop Point Configuration -->
            <div class="time-section">
                <label>Stop Time</label>
                <div class="time-inputs">
                    <input type="tel" class="time-box stop-box" data-idx="3" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="HH">
                    <span>:</span>
                    <input type="tel" class="time-box stop-box" data-idx="4" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="MM">
                    <span>:</span>
                    <input type="tel" class="time-box stop-box" data-idx="5" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="SS">
                </div>
            </div>
        </div>

        <!-- Generate Output Call-to-action -->
        <button id="convertBtn">Convert & Copy</button>
    </div>

    <!-- Feedback Notice Component -->
    <div id="toast">Link Copied!</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlInput = document.getElementById('urlInput');
            const pasteBtn = document.getElementById('pasteBtn');
            const convertBtn = document.getElementById('convertBtn');
            const timeBoxes = Array.from(document.querySelectorAll('.time-box'));
            const toast = document.getElementById('toast');

            // System Clipboard Handling
            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    urlInput.value = text;
                    urlInput.focus();
                } catch (err) {
                    alert('Clipboard reading blocked. Paste manually inside the box.');
                }
            });

            // Input Navigation Framework
            timeBoxes.forEach((box, index) => {
                box.addEventListener('input', () => {
                    box.value = box.value.replace(/[^0-9]/g, '');
                    if (box.value.length === 2 && index < timeBoxes.length - 1) {
                        timeBoxes[index + 1].focus();
                    }
                });

                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (index < timeBoxes.length - 1) {
                            timeBoxes[index + 1].focus();
                        } else {
                            box.blur();
                            convertBtn.click();
                        }
                    }
                });

                box.addEventListener('blur', () => {
                    if (box.value === '') {
                        box.value = '00';
                    } else if (box.value.length === 1) {
                        box.value = '0' + box.value;
                    }
                });
                
                box.addEventListener('focus', () => box.select());
            });

            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    timeBoxes[0].focus();
                }
            });

            // Master Application Reset Shortcut
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    urlInput.value = '';
                    timeBoxes.forEach(box => box.value = '');
                    urlInput.focus();
                }
            });

            // Conversion Calculations
            const parseTimeToSeconds = (hours, minutes, seconds) => {
                return (parseInt(hours || 0, 10) * 3600) + 
                       (parseInt(minutes || 0, 10) * 60) + 
                       parseInt(seconds || 0, 10);
            };

            const extractYouTubeId = (url) => {
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                const match = url.match(regex);
                return match ? match[1] : null;
            };

            const showToast = () => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2200);
            };

            convertBtn.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                if (!url) return alert('Please input a YouTube address.');

                if (url.includes('youtube.com/embed/') && url.includes('start=') && url.includes('end=')) {
                    await navigator.clipboard.writeText(url);
                    showToast();
                    return;
                }

                const videoId = extractYouTubeId(url);
                if (!videoId) return alert('Unrecognized YouTube format.');

                timeBoxes.forEach(box => { if(!box.value) box.value = '00'; });

                const startSec = parseTimeToSeconds(timeBoxes[0].value, timeBoxes[1].value, timeBoxes[2].value);
                const stopSec = parseTimeToSeconds(timeBoxes[3].value, timeBoxes[4].value, timeBoxes[5].value);

                if (stopSec <= startSec && stopSec !== 0) {
                    return alert('Stop stamp must succeed start stamp.');
                }

                const embedUrl = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&start=${startSec}&end=${stopSec}`;

                try {
                    await navigator.clipboard.writeText(embedUrl);
                    showToast();
                } catch (err) {
                    const fallback = document.createElement('input');
                    fallback.value = embedUrl;
                    document.body.appendChild(fallback);
                    fallback.select();
                    document.execCommand('copy');
                    document.body.removeChild(fallback);
                    showToast();
                }
            });
        });
    </script>
</body>
</html>
